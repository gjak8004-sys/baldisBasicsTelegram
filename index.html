<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | Baldi's Basics Classic</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="https://telegram.org"></script>
    <script src="TemplateData/UnityProgress.js"></script>
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/Новая папка.json", {onProgress: UnityProgress});

      window.RequestTelegramData = function() {
          if (window.Telegram && window.Telegram.WebApp) {
              window.Telegram.WebApp.ready();
              if (window.Telegram.WebApp.requestFullscreen) {
                  window.Telegram.WebApp.requestFullscreen();
              } else {
                  window.Telegram.WebApp.expand(); 
              }
              var user = window.Telegram.WebApp.initDataUnsafe.user;
              if (user) {
                  var username = user.username || user.first_name || "Игрок";
                  gameInstance.SendMessage('TelegramManager', 'SetUsername', username);
              }
          }
      };

      window.SendScoreToTelegram = function(score) {
          if (window.Telegram && window.Telegram.WebApp) {
              window.Telegram.WebApp.sendData(JSON.stringify({ action: "add_score", points: score }));
          }
      };
    </script>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }
      .webgl-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100% !important;
        height: 100% !important;
        max-width: 100vw;
        max-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      #gameContainer {
        width: 100vw !important; 
        height: 56.25vw !important; 
        max-height: 100vh !important;
        max-width: 177.78vh !important;
      }
      .footer {
        display: none !important; 
      }
    </style>
  </head>
  <body>
    <div class="webgl-content">
      <div id="gameContainer"></div>
    </div>
  </body>
</html>
